<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز مواعيد إدارة الدمج بدمياط</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; text-align: right; }
        .no-print-zone { max-width: 850px; margin: 20px auto; }
        .main-card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: none; overflow: hidden; }
        .official-header { background: #fff; padding: 15px; text-align: center; color: #333; border-bottom: 3px solid #1e5799; }
        .card-header-custom { background: #1e5799; color: white; padding: 15px; text-align: center; }
        #ticket-wrapper { display: none; padding: 20px; }
        .ticket-container { border: 2px solid #1e5799; padding: 20px; background: white; border-radius: 10px; max-width: 700px; margin: auto; }
        .data-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 10px; text-align: right; }
        .data-table th { background-color: #f8f9fa; width: 30%; }
        @media print { .no-print-zone { display: none; } #ticket-wrapper { display: block; } .ticket-container { border: 2px solid #000; } }
    </style>
</head>
<body>

<div class="container no-print-zone" id="form-container">
    <div class="card main-card">
        <!-- الترويسة الرسمية المطلوبة -->
        <div class="official-header">
            <h5 class="mb-1">محافظة دمياط</h5>
            <h5 class="mb-1">مديرية التربية والتعليم</h5>
            <h5 class="mb-0">إدارة الدمج الشامل</h5>
        </div>
        
        <div class="card-header-custom">
            <h4 class="mb-0">حجز موعد تقديم أوراق لإدارة الدمج الشامل</h4>
        </div>

        <div class="card-body p-4">
            <form id="booking-form">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label fw-bold">اسم الطالب رباعي</label><input type="text" id="studentName" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">الرقم القومي للطالب</label><input type="text" id="nationalId" class="form-control" required maxlength="14" minlength="14"></div>
                    <div class="col-md-4"><label class="form-label fw-bold">الإدارة التعليمية</label><input type="text" id="eduAdmin" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label fw-bold">المرحلة</label>
                        <select id="eduStage" class="form-select" required>
                            <option value="">اختر...</option><option>رياض أطفال</option><option>ابتدائي</option><option>اعدادي</option><option>ثانوي</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label class="form-label fw-bold">الصف</label><input type="text" id="eduClass" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">المدرسة</label><input type="text" id="schoolName" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">نوع الإجراء</label>
                        <select id="procedureType" class="form-select" required>
                            <option value="">اختر...</option>
                            <option>دمج لأول مرة</option><option>تجديد دمج</option><option>إلغاء دمج</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label class="form-label fw-bold">نوع الإعاقة</label><input type="text" id="disabilityType" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label fw-bold">درجة الذكاء</label><input type="number" id="iqScore" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label fw-bold">رقم التليفون</label><input type="tel" id="phoneNumber" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">تاريخ الحجز (6 إلى 11)</label>
                        <input type="date" id="bookingDate" class="form-control" required>
                    </div>
                    <div class="col-md-6"><label class="form-label fw-bold">الفترة الزمنية</label>
                        <select id="timeSlot" class="form-select" required>
                            <option value="">اختر...</option>
                            <option>09:00 ص - 10:00 ص</option><option>10:00 ص - 11:00 ص</option><option>11:00 ص - 12:00 م</option><option>12:00 م - 01:00 م</option><option>01:00 م - 02:00 م</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary w-100 mt-4 py-2 fw-bold">تأكيد الحجز وإصدار التذكرة</button>
            </form>
        </div>
    </div>
</div>

<!-- واجهة التذكرة -->
<div id="ticket-wrapper">
    <div class="no-print-zone text-center mb-4">
        <button class="btn btn-success btn-lg me-2" onclick="window.print()">طباعة التذكرة</button>
        <button class="btn btn-secondary btn-lg" onclick="location.reload()">حجز جديد</button>
    </div>
    <div class="ticket-container">
        <div class="text-center mb-3">
            <h6>محافظة دمياط - مديرية التربية والتعليم</h6>
            <h6>إدارة الدمج الشامل</h6>
            <hr>
            <h4>تذكرة مراجعة ملف دمج</h4>
        </div>
        <div class="row text-center my-3">
            <div class="col-4 border-end"><b>رقم التذكرة</b><br><span id="t-num"></span></div>
            <div class="col-4 border-end"><b>التاريخ</b><br><span id="t-date"></span></div>
            <div class="col-4"><b>الفترة</b><br><span id="t-slot"></span></div>
        </div>
        <table class="data-table">
            <tr><th>الاسم</th><td id="t-name"></td></tr>
            <tr><th>الرقم القومي</th><td id="t-id"></td></tr>
            <tr><th>الإجراء</th><td id="t-proc"></td></tr>
            <tr><th>المدرسة</th><td id="t-school"></td></tr>
        </table>
        <p class="mt-4 text-center small fw-bold">يرجى الحضور في الموعد المحدد مع كافة الأوراق الرسمية.</p>
    </div>
</div>

<script>
    // هام: استبدل هذا الرابط برابط النشر الجديد (Web App URL)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyLDtdQS9OpLe1WA8oa2S8mjWy0LFSYT5kFc5GRu65iMA5BYdFiLNd4R5grpKPjSU02CA/exec'; 

    const dateInput = document.getElementById('bookingDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today; // لا يسمح بتاريخ قديم

    // منع اختيار الجمعة والسبت
    dateInput.addEventListener('input', function() {
        const day = new Date(this.value).getDay();
        if(day === 5 || day === 6) {
            alert('أيام الجمعة والسبت عطلة رسمية. اختر يوماً آخر.');
            this.value = '';
        }
    });

    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "جاري الحجز...";
        
        const payload = {
            studentName: document.getElementById('studentName').value,
            nationalId: document.getElementById('nationalId').value,
            eduAdmin: document.getElementById('eduAdmin').value,
            eduStage: document.getElementById('eduStage').value,
            eduClass: document.getElementById('eduClass').value,
            schoolName: document.getElementById('schoolName').value,
            procedureType: document.getElementById('procedureType').value,
            disabilityType: document.getElementById('disabilityType').value,
            iqScore: document.getElementById('iqScore').value,
            phoneNumber: document.getElementById('phoneNumber').value,
            bookingDate: document.getElementById('bookingDate').value,
            timeSlot: document.getElementById('timeSlot').value
        };

        fetch(WEB_APP_URL, { 
            method: 'POST', 
            mode: 'cors', // تفعيل نمط CORS
            body: JSON.stringify(payload) 
        })
        .then(r => r.json())
        .then(res => {
            if(res.status === 'success') {
                document.getElementById('t-num').innerText = res.ticketNumber;
                document.getElementById('t-date').innerText = payload.bookingDate;
                document.getElementById('t-slot').innerText = payload.timeSlot;
                document.getElementById('t-name').innerText = payload.studentName;
                document.getElementById('t-id').innerText = payload.nationalId;
                document.getElementById('t-proc').innerText = payload.procedureType;
                document.getElementById('t-school').innerText = payload.schoolName;
                
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('ticket-wrapper').style.display = 'block';
            } else {
                alert(res.message);
                btn.disabled = false; btn.innerText = "تأكيد الحجز";
            }
        })
        .catch(err => {
            alert("خطأ في الاتصال: تأكد من نشر الرابط بصلاحية (Anyone)");
            btn.disabled = false; btn.innerText = "تأكيد الحجز";
        });
    });
</script>
</body>
</html>
